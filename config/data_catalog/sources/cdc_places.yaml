source_id: CDC_PLACES
canonical_name: CDC PLACES
aliases:
  - CDC Places
  - PLACES

# ── Backward-compatible flat fields ─────────────────────────────────────────
roles:
  - outcome
tier: stable
cloud_safe: true
machine_readable: true
source_type: api_download
expected_format: csv_api_gis
auth_required: false
cost_required: false
access_url: https://www.cdc.gov/places/tools/data-portal.html
documentation_url: https://www.cdc.gov/places/about/index.html
coverage_year_min: 2016
coverage_year_max: 2024
spatial_units:
  - census_tract
  - county
  - place
  - zcta

# ── Enhanced data catalog fields ─────────────────────────────────────────────
acquisition:
  method: api
  url: https://data.cdc.gov/resource/yjkw-uj5s.csv
  documentation_url: https://www.cdc.gov/places/about/index.html
  expected_format: csv_api_gis
  auth_required: false
  cost_required: false
  expected_files:
    - data/raw/cdc_places.csv
  notes: >
    Download via CDC PLACES Census Tract Data GIS-friendly Socrata endpoint
    or direct CSV download. For the 2025 tract GIS-friendly release, key
    columns are TractFIPS (=GEOID 11-digit tract FIPS) and measure-specific
    wide columns such as lpa_crudeprev. The long-format Socrata endpoint
    (cwsq-ngmh) is also usable; there, filter MeasureId='LPA' and join with
    LocationID.

geography:
  native_unit: census_tract
  target_units_supported:
    - census_tract
    - county
    - place
    - zcta
  aggregation_required: false
  default_aggregation: ""
  join_keys:
    - GEOID
    - TractFIPS
    - LocationID
  coverage: nationwide

temporal_coverage:
  coverage_year_min: 2016
  coverage_year_max: 2024
  release_lag_years: 2.0
  update_frequency: annual
  cross_sectional_only: false
  notes: >
    Annual releases; each year's data covers model-based estimates.
    Panel analysis is possible but note that small-area estimates have
    changing model specifications across years.

variable_families:
  physical_inactivity:
    family_id: physical_inactivity
    description: Crude prevalence of physical inactivity among adults
    variables:
      - name: lpa_crudeprev
        description: No leisure-time physical activity among adults (crude %)
        unit: percent_crude
        dtype: float
      - name: lpa_crude95ci
        description: 95% confidence interval for crude physical inactivity prevalence
        unit: percent_interval
        dtype: string
    aggregation_allowed_to:
      - county

  obesity:
    family_id: obesity
    description: Crude prevalence of obesity among adults
    variables:
      - name: obesity_crudeprev
        description: Obesity among adults (crude %)
        unit: percent_crude
        dtype: float
    aggregation_allowed_to:
      - county

  diabetes:
    family_id: diabetes
    description: Crude prevalence of diagnosed diabetes among adults
    variables:
      - name: diabetes_crudeprev
        description: Diagnosed diabetes among adults (crude %)
        unit: percent_crude
        dtype: float
    aggregation_allowed_to:
      - county

  asthma:
    family_id: asthma
    description: Crude prevalence of current asthma among adults
    variables:
      - name: casthma_crudeprev
        description: Current asthma among adults (crude %)
        unit: percent_crude
        dtype: float
    aggregation_allowed_to:
      - county

  poor_mental_health:
    family_id: poor_mental_health
    description: Crude prevalence of frequent mental distress among adults
    variables:
      - name: mhlth_crudeprev
        description: Mental health not good for >=14 days (crude %)
        unit: percent_crude
        dtype: float
    aggregation_allowed_to:
      - county

  poor_physical_health:
    family_id: poor_physical_health
    description: Crude prevalence of frequent physical distress among adults
    variables:
      - name: phlth_crudeprev
        description: Physical health not good for >=14 days (crude %)
        unit: percent_crude
        dtype: float
    aggregation_allowed_to:
      - county

  cardiovascular_disease:
    family_id: cardiovascular_disease
    description: Crude prevalence of coronary heart disease among adults
    variables:
      - name: chd_crudeprev
        description: Coronary heart disease among adults (crude %)
        unit: percent_crude
        dtype: float
    aggregation_allowed_to:
      - county

join_recipes:
  - recipe_id: cdc_places_tract_to_study
    left_source: CDC_PLACES
    right_source: TIGER_Lines
    left_key: TractFIPS
    right_key: GEOID
    join_type: inner
    notes: >
      Join CDC PLACES tract-level estimates to TIGER tract boundaries on GEOID.
      TractFIPS in the GIS-friendly release equals 11-digit census tract FIPS
      (same as TIGER GEOID). If using the long-format endpoint instead, use
      LocationID as the equivalent key.
    warnings:
      - Use the Census Tract GIS-friendly release or filter the long-format endpoint to census tracts before joining

validation_rules:
  - rule_id: tractfips_is_11_digits
    description: TractFIPS for tract level must be 11-digit census tract FIPS
    severity: error
  - rule_id: data_value_range
    description: Crude prevalence fields should be between 0 and 100
    severity: warning
  - rule_id: confirm_tract_endpoint
    description: Use tract GIS-friendly endpoint or filter long-format endpoint to census tracts
    severity: error

known_limitations:
  - "Model-based small-area estimates — not direct survey measurements"
  - "Suppressed values for small populations; check confidence intervals and footnotes"
  - "GIS-friendly tract release exposes crude prevalence fields; age-adjusted fields may require a different endpoint or release"
  - "Annual model specification changes make strict panel comparison difficult"
