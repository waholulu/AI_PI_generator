sources:
  EPA_National_Walkability_Index:
    canonical_name: EPA National Walkability Index
    aliases:
      - EPA Walkability Index
      - National Walkability Index
    source_type: download
    access_url: https://www.epa.gov/smartgrowth/smart-location-mapping
    documentation_url: https://www.epa.gov/smartgrowth/national-walkability-index-user-guide-and-methodology
    expected_format: zip_csv_gis
    machine_readable: true
    auth_required: false
    cost_required: false
    roles: [exposure]
    spatial_units: [block_group]
