# Reflection loop configuration for Module 1 upgrade
reflection:
  max_rounds: 3
  min_rounds_before_stop: 2
  early_stop_delta_threshold: 0.5
  oscillation_window: 3          # consecutive rounds with same 4-tuple → force TENTATIVE

cost_guardrails:
  per_run_budget_usd: 1.50
  per_topic_budget_usd: 0.10
  emit_warning_at_ratio: 0.70
  disable_new_at_ratio: 0.90
  kill_switch_at_ratio: 1.00

feature_flags:
  use_slot_schema: true
  use_seven_gates: true
  use_reflection_loop: true
  use_budget_tracker: true
  enable_tentative_pool: true
  legacy_fallback_on_error: true
