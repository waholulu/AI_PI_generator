name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        id: deploy
        continue-on-error: true
        run: |
          railway up 2>&1 | tee /tmp/railway_deploy.log
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for Railway to swap containers
        if: steps.deploy.outcome == 'success'
        run: |
          echo "Waiting 60s for Railway to replace the running container..."
          sleep 60

      - name: Fetch Railway service logs
        id: railwaylogs
        if: steps.deploy.outcome == 'success'
        continue-on-error: true
        run: |
          railway logs --tail 40 2>&1 | tee /tmp/railway_runtime.log
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Check for container crash in logs
        id: crashcheck
        if: steps.deploy.outcome == 'success'
        run: |
          if grep -qi "failed to start\|could not be found\|error\|exited with\|crashed\|ModuleNotFoundError\|ImportError" /tmp/railway_runtime.log; then
            echo "crash=true" >> "$GITHUB_OUTPUT"
            echo "::error::Possible container crash detected in Railway logs"
          else
            echo "crash=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Health check
        id: healthcheck
        if: steps.deploy.outcome == 'success' && vars.AUTOPI_API_URL != ''
        continue-on-error: true
        run: |
          URL="${{ vars.AUTOPI_API_URL }}/health"
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /tmp/health_response.txt -w "%{http_code}" "$URL" --max-time 10 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "healthy=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 10
          done
          echo "healthy=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Create GitHub Issue on failure
        if: |
          steps.deploy.outcome == 'failure' ||
          steps.healthcheck.outcome == 'failure' ||
          steps.crashcheck.outputs.crash == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let deployLog = '(no deploy log)';
            try { deployLog = fs.readFileSync('/tmp/railway_deploy.log', 'utf8'); } catch {}
            let runtimeLog = '(no runtime log)';
            try { runtimeLog = fs.readFileSync('/tmp/railway_runtime.log', 'utf8'); } catch {}
            let healthResp = '';
            try { healthResp = fs.readFileSync('/tmp/health_response.txt', 'utf8'); } catch {}

            const deployFailed = '${{ steps.deploy.outcome }}' === 'failure';
            const healthFailed = '${{ steps.healthcheck.outcome }}' === 'failure';
            const crashed = '${{ steps.crashcheck.outputs.crash }}' === 'true';

            let body = `**Commit:** ${context.sha}\n`;
            body += `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n`;

            if (deployFailed) {
              body += `## Build / Deploy Error\n\`\`\`\n${deployLog.slice(-3000)}\n\`\`\`\n\n`;
            }
            if (crashed) {
              body += `## Railway Runtime Logs (crash detected)\n\`\`\`\n${runtimeLog.slice(-3000)}\n\`\`\`\n\n`;
            }
            if (healthFailed) {
              body += `## Health Check Failed\n\`\`\`\n${healthResp || '(no response)'}\n\`\`\`\n\n`;
            }

            // Close previous deploy-error issues
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'deploy-error',
              state: 'open',
            });
            for (const issue of existing.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned',
              });
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Auto] Railway deploy failed — ${new Date().toISOString().slice(0,16)}`,
              body,
              labels: ['deploy-error'],
            });
