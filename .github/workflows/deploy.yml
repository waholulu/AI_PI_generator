name: Deploy to Railway

permissions:
  contents: read
  issues: write

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        id: deploy
        continue-on-error: true
        run: |
          set -o pipefail
          railway up 2>&1 | tee /tmp/railway_deploy.log
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Health check
        id: healthcheck
        if: steps.deploy.outcome == 'success' && vars.AUTOPI_API_URL != ''
        continue-on-error: true
        run: |
          echo "Waiting 20s for deployment to stabilize..."
          sleep 20
          URL="${{ vars.AUTOPI_API_URL }}/health"
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /tmp/health_response.txt -w "%{http_code}" "$URL" --max-time 10 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "healthy=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 10
          done
          echo "healthy=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Create GitHub Issue on failure
        if: steps.deploy.outcome == 'failure' || steps.healthcheck.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Gather error details
            let deployLog = '(no deploy log)';
            try { deployLog = fs.readFileSync('/tmp/railway_deploy.log', 'utf8'); } catch {}
            let healthResp = '';
            try { healthResp = fs.readFileSync('/tmp/health_response.txt', 'utf8'); } catch {}

            const deployFailed = '${{ steps.deploy.outcome }}' === 'failure';
            const healthFailed = '${{ steps.healthcheck.outcome }}' === 'failure';

            let body = `**Commit:** ${context.sha}\n`;
            body += `**Workflow:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n`;

            if (deployFailed) {
              body += `## Build / Deploy Error\n\`\`\`\n${deployLog.slice(-3000)}\n\`\`\`\n`;
            }
            if (healthFailed) {
              body += `## Health Check Failed\nResponse: ${healthResp || '(no response)'}\n`;
            }

            // Close previous deploy-error issues
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'deploy-error',
              state: 'open',
            });
            for (const issue of existing.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned',
              });
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Auto] Railway deploy failed — ${new Date().toISOString().slice(0,16)}`,
              body,
              labels: ['deploy-error'],
            });
