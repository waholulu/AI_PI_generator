name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen --extra geospatial

      - name: Run tests (exclude live API tests)
        run: uv run pytest tests/ -x -q --ignore=tests/test_field_scan_live.py -m "not live_openalex and not live_llm"
        env:
          AUTOPI_DATA_ROOT: /tmp/autopi_test

      - name: Candidate factory eval (threshold check)
        run: |
          uv run python scripts/eval_candidate_factory.py \
            --template built_environment_health \
            --domain "Built environment and health outcomes" \
            --max-candidates 40 \
            --enable-experimental false \
            --enable-tier2 true \
            --no-paid-api true \
            --output /tmp/autopi_test/eval_candidate_factory.json \
            --check-thresholds
        env:
          AUTOPI_DATA_ROOT: /tmp/autopi_test
