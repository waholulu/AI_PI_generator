name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests (exclude live API tests)
        run: uv run pytest tests/ -x -q --ignore=tests/test_field_scan_live.py -m "not live_openalex and not live_llm"
        env:
          AUTOPI_DATA_ROOT: /tmp/autopi_test
