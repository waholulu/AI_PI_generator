<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto-PI Research Engine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; color: #a78bfa; }
    header span { font-size: 0.85rem; color: #64748b; }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100vh - 57px);
    }

    /* ── Sidebar ── */
    .sidebar {
      background: #1a1d27;
      border-right: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .new-run-form {
      padding: 20px;
      border-bottom: 1px solid #2d3148;
    }
    .new-run-form h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: .08em; color: #64748b; margin-bottom: 12px; }

    textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 10px 12px;
      font-size: 0.9rem;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #7c3aed; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: #7c3aed; color: #fff; width: 100%; margin-top: 10px; }
    .btn-primary:not(:disabled):hover { background: #6d28d9; }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-success:not(:disabled):hover { background: #15803d; }
    .btn-danger  { background: #dc2626; color: #fff; }
    .btn-danger:not(:disabled):hover  { background: #b91c1c; }
    .btn-ghost   { background: #2d3148; color: #cbd5e1; }
    .btn-ghost:not(:disabled):hover   { background: #374160; }

    .run-list { flex: 1; overflow-y: auto; padding: 12px; }
    .run-list h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: .08em; color: #64748b; margin-bottom: 8px; padding: 0 4px; }

    .run-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      margin-bottom: 6px;
      transition: background .12s;
    }
    .run-item:hover { background: #252840; }
    .run-item.active { background: #252840; border-color: #7c3aed; }
    .run-item-domain { font-size: 0.875rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .run-item-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .run-item-time { font-size: 0.75rem; color: #64748b; }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .badge-starting   { background: #1e3a5f; color: #60a5fa; }
    .badge-running    { background: #1a3a2a; color: #4ade80; }
    .badge-awaiting   { background: #3b2700; color: #fbbf24; }
    .badge-completed  { background: #1a3a2a; color: #34d399; }
    .badge-failed     { background: #3b1111; color: #f87171; }
    .badge-aborted    { background: #2a2a2a; color: #94a3b8; }

    /* ── Main panel ── */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #475569;
      gap: 12px;
    }
    .empty-state svg { opacity: .3; }
    .empty-state p { font-size: 0.95rem; }

    .detail-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .detail-header {
      padding: 20px 28px 16px;
      border-bottom: 1px solid #2d3148;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }
    .detail-header-left h2 { font-size: 1.05rem; font-weight: 600; margin-bottom: 6px; }
    .detail-header-left .meta { font-size: 0.8rem; color: #64748b; }
    .detail-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #2d3148;
      padding: 0 28px;
    }
    .tab {
      padding: 10px 16px;
      font-size: 0.875rem;
      cursor: pointer;
      color: #64748b;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .12s;
    }
    .tab:hover { color: #cbd5e1; }
    .tab.active { color: #a78bfa; border-bottom-color: #7c3aed; }

    .tab-content { flex: 1; overflow-y: auto; padding: 20px 28px; }

    /* HITL banner */
    .hitl-banner {
      margin-bottom: 20px;
      background: #2a1f00;
      border: 1px solid #78350f;
      border-radius: 10px;
      padding: 16px 20px;
    }
    .hitl-banner h3 { color: #fbbf24; font-size: 0.95rem; margin-bottom: 6px; }
    .hitl-banner p  { font-size: 0.85rem; color: #d97706; margin-bottom: 12px; }
    .hitl-actions { display: flex; gap: 10px; }

    /* Status card */
    .status-card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }
    .status-card h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: .08em; color: #64748b; margin-bottom: 10px; }
    .kv-grid { display: grid; grid-template-columns: 130px 1fr; gap: 6px 12px; font-size: 0.875rem; }
    .kv-label { color: #64748b; }
    .kv-value { color: #e2e8f0; word-break: break-all; }

    /* Progress steps */
    .pipeline-steps { display: flex; gap: 0; margin-bottom: 16px; }
    .step {
      flex: 1;
      text-align: center;
      padding: 10px 4px;
      font-size: 0.75rem;
      background: #1a1d27;
      border: 1px solid #2d3148;
      color: #475569;
      position: relative;
    }
    .step:first-child { border-radius: 8px 0 0 8px; }
    .step:last-child  { border-radius: 0 8px 8px 0; }
    .step + .step { border-left: none; }
    .step.done    { background: #1a3a2a; color: #4ade80; border-color: #166534; }
    .step.active  { background: #1e2d4a; color: #60a5fa; border-color: #1d4ed8; }
    .step.waiting { background: #2a1f00; color: #fbbf24; border-color: #78350f; }

    /* Logs */
    .log-toolbar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
    .log-filter {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #e2e8f0;
      padding: 5px 10px;
      font-size: 0.8rem;
    }
    .log-filter:focus { outline: none; border-color: #7c3aed; }
    .log-auto-label { font-size: 0.8rem; color: #64748b; display: flex; align-items: center; gap: 6px; margin-left: auto; }

    .log-box {
      background: #0a0c12;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 12px;
      font-family: "JetBrains Mono", "Fira Code", monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      overflow-y: auto;
      max-height: 460px;
    }
    .log-line { display: flex; gap: 10px; }
    .log-ts   { color: #475569; flex-shrink: 0; }
    .log-lvl  { flex-shrink: 0; width: 52px; font-weight: 600; }
    .log-lvl-INFO  { color: #60a5fa; }
    .log-lvl-WARNING { color: #fbbf24; }
    .log-lvl-ERROR { color: #f87171; }
    .log-lvl-DEBUG { color: #94a3b8; }
    .log-msg  { color: #cbd5e1; }

    /* Outputs */
    .output-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .output-card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .output-card-name { font-size: 0.875rem; font-weight: 500; word-break: break-all; }
    .output-card-size { font-size: 0.75rem; color: #64748b; }
    .output-card a {
      margin-top: 4px;
      font-size: 0.8rem;
      color: #a78bfa;
      text-decoration: none;
    }
    .output-card a:hover { text-decoration: underline; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 0.875rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      z-index: 999;
      max-width: 320px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.error { border-color: #991b1b; color: #fca5a5; }
    #toast.success { border-color: #166534; color: #86efac; }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #4ade8044;
      border-top-color: #4ade80;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
  </svg>
  <h1>Auto-PI Research Engine</h1>
  <span>Multi-Agent Academic Research Pipeline</span>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="new-run-form">
      <h2>新建研究任务</h2>
      <textarea id="domainInput" placeholder="输入研究方向，例如：GeoAI and Urban Planning">GeoAI and Urban Planning</textarea>
      <button class="btn btn-primary" id="startBtn" onclick="startRun()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        启动研究
      </button>
    </div>
    <div class="run-list">
      <h2>历史任务</h2>
      <div id="runList"></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <div class="empty-state" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
      <p>选择或启动一个研究任务</p>
    </div>
    <div class="detail-panel" id="detailPanel" style="display:none"></div>
  </main>
</div>

<div id="toast"></div>

<script>
const PIPELINE_NODES = ['field_scanner','ideation','literature','drafter','data_fetcher'];

let state = {
  runs: [],
  activeRunId: null,
  pollTimer: null,
  logTimer: null,
  activeTab: 'status',
  logAutoScroll: true,
  logLevel: '',
};

// ── API helpers ─────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({detail: res.statusText}));
    throw new Error(err.detail || res.statusText);
  }
  return res.json();
}

// ── Toast ───────────────────────────────────────────────────────────────────
let _toastTimer;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.className = '', 3000);
}

// ── Sidebar run list ────────────────────────────────────────────────────────
async function loadRuns() {
  try {
    state.runs = await api('GET', '/runs');
    renderRunList();
  } catch(e) { /* silent */ }
}

function renderRunList() {
  const el = document.getElementById('runList');
  if (!state.runs.length) {
    el.innerHTML = '<div style="font-size:.8rem;color:#475569;padding:8px 4px">暂无任务</div>';
    return;
  }
  el.innerHTML = state.runs.map(r => `
    <div class="run-item ${r.run_id === state.activeRunId ? 'active' : ''}"
         onclick="selectRun('${r.run_id}')">
      <div class="run-item-domain">${escHtml(r.domain_input)}</div>
      <div class="run-item-meta">
        <span class="badge ${badgeClass(r.status)}">${statusLabel(r.status)}</span>
        <span class="run-item-time">${fmtTime(r.started_at)}</span>
      </div>
    </div>
  `).join('');
}

// ── Select run ──────────────────────────────────────────────────────────────
async function selectRun(runId) {
  clearPoll();
  state.activeRunId = runId;
  state.activeTab = 'status';
  renderRunList();
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('detailPanel').style.display = 'flex';
  await refreshDetail();
  schedulePoll();
}

// ── Start run ───────────────────────────────────────────────────────────────
async function startRun() {
  const domain = document.getElementById('domainInput').value.trim();
  if (!domain) { toast('请输入研究方向', 'error'); return; }
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  try {
    const run = await api('POST', '/runs', {domain_input: domain});
    toast('任务已启动', 'success');
    await loadRuns();
    selectRun(run.run_id);
  } catch(e) {
    toast('启动失败：' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

// ── Detail panel ────────────────────────────────────────────────────────────
async function refreshDetail() {
  if (!state.activeRunId) return;
  try {
    const run = await api('GET', `/runs/${state.activeRunId}/status`);
    renderDetail(run);
    // update sidebar badge
    const idx = state.runs.findIndex(r => r.run_id === run.run_id);
    if (idx >= 0) { state.runs[idx].status = run.status; renderRunList(); }
    // stop polling if terminal
    if (['completed','failed','aborted'].includes(run.status)) clearPoll();
  } catch(e) { /* silent */ }
}

function renderDetail(run) {
  const panel = document.getElementById('detailPanel');
  const isHITL = run.status === 'awaiting_approval';
  const isDone = ['completed','failed','aborted'].includes(run.status);
  const isRunning = run.status === 'running' || run.status === 'starting';

  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-header-left">
        <h2>${escHtml(run.domain_input)}</h2>
        <div class="meta">
          Run ID: ${run.run_id}
          &nbsp;·&nbsp; 启动：${fmtTime(run.started_at)}
          ${run.completed_at ? '&nbsp;·&nbsp; 完成：' + fmtTime(run.completed_at) : ''}
        </div>
      </div>
      <div class="detail-actions">
        ${isRunning ? '<span class="spinner"></span>' : ''}
        <span class="badge ${badgeClass(run.status)}">${statusLabel(run.status)}</span>
        <button class="btn btn-ghost" onclick="refreshDetail()" title="刷新">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        </button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab ${state.activeTab==='status'?'active':''}" onclick="switchTab('status')">状态</div>
      <div class="tab ${state.activeTab==='logs'?'active':''}" onclick="switchTab('logs')">日志</div>
      <div class="tab ${state.activeTab==='outputs'?'active':''}" onclick="switchTab('outputs')">输出文件</div>
    </div>

    <div class="tab-content" id="tabContent"></div>
  `;

  renderTab(run);
}

function switchTab(tab) {
  state.activeTab = tab;
  const run = state.runs.find(r => r.run_id === state.activeRunId);
  // re-fetch full status then render
  api('GET', `/runs/${state.activeRunId}/status`).then(renderDetail).catch(()=>{});
}

function renderTab(run) {
  const el = document.getElementById('tabContent');
  if (!el) return;
  if (state.activeTab === 'status')   renderStatusTab(el, run);
  else if (state.activeTab === 'logs')    renderLogsTab(el, run);
  else if (state.activeTab === 'outputs') renderOutputsTab(el, run);
}

// ── Status tab ──────────────────────────────────────────────────────────────
function renderStatusTab(el, run) {
  const isHITL = run.status === 'awaiting_approval';
  const nodeIndex = PIPELINE_NODES.indexOf(run.current_node);

  const stepsHtml = PIPELINE_NODES.map((n, i) => {
    let cls = '';
    if (run.status === 'completed') cls = 'done';
    else if (i < nodeIndex) cls = 'done';
    else if (i === nodeIndex) cls = run.status === 'awaiting_approval' ? 'waiting' : 'active';
    const labels = {field_scanner:'文献扫描', ideation:'课题构思', literature:'文献收集', drafter:'初稿撰写', data_fetcher:'数据获取'};
    return `<div class="step ${cls}">${labels[n]||n}</div>`;
  }).join('');

  el.innerHTML = `
    ${isHITL ? `
      <div class="hitl-banner">
        <h3>⏸ 需要人工审批</h3>
        <p>构思阶段已完成，请确认研究方向后继续执行文献收集。</p>
        <div class="hitl-actions">
          <button class="btn btn-success" onclick="approveRun('${run.run_id}')">批准并继续</button>
          <button class="btn btn-danger"  onclick="rejectRun('${run.run_id}')">终止任务</button>
        </div>
      </div>
    ` : ''}

    <div style="margin-bottom:16px">${stepsHtml}</div>

    <div class="status-card">
      <h3>运行信息</h3>
      <div class="kv-grid">
        <span class="kv-label">状态</span>
        <span class="kv-value"><span class="badge ${badgeClass(run.status)}">${statusLabel(run.status)}</span></span>
        <span class="kv-label">当前节点</span>
        <span class="kv-value">${run.current_node || '—'}</span>
        <span class="kv-label">Run ID</span>
        <span class="kv-value" style="font-family:monospace;font-size:.8rem">${run.run_id}</span>
        ${run.error ? `<span class="kv-label" style="color:#f87171">错误</span><span class="kv-value" style="color:#f87171">${escHtml(run.error)}</span>` : ''}
      </div>
    </div>

    ${run.status === 'awaiting_approval' ? `
      <div class="status-card">
        <h3>查看研究计划</h3>
        <p style="font-size:.85rem;color:#94a3b8;margin-bottom:12px">在"输出文件"标签页下载 <code>topic_screening.json</code> 查看完整构思结果。</p>
        <button class="btn btn-ghost" onclick="switchTab('outputs')">查看输出文件 →</button>
      </div>
    ` : ''}
  `;
}

// ── HITL actions ─────────────────────────────────────────────────────────────
async function approveRun(runId) {
  try {
    await api('POST', `/runs/${runId}/approve`);
    toast('已批准，继续执行', 'success');
    await refreshDetail();
    schedulePoll();
  } catch(e) { toast('操作失败：' + e.message, 'error'); }
}
async function rejectRun(runId) {
  if (!confirm('确认终止此任务？')) return;
  try {
    await api('POST', `/runs/${runId}/reject`);
    toast('任务已终止', 'success');
    await refreshDetail();
  } catch(e) { toast('操作失败：' + e.message, 'error'); }
}

// ── Logs tab ─────────────────────────────────────────────────────────────────
function renderLogsTab(el, run) {
  el.innerHTML = `
    <div class="log-toolbar">
      <select class="log-filter" id="logLevel" onchange="updateLogLevel(this.value)">
        <option value="">全部级别</option>
        <option value="DEBUG">DEBUG</option>
        <option value="INFO">INFO</option>
        <option value="WARNING">WARNING</option>
        <option value="ERROR">ERROR</option>
      </select>
      <button class="btn btn-ghost" onclick="fetchLogs()" style="padding:5px 12px;font-size:.8rem">刷新</button>
      <label class="log-auto-label">
        <input type="checkbox" id="autoScroll" ${state.logAutoScroll?'checked':''} onchange="state.logAutoScroll=this.checked">
        自动滚动
      </label>
    </div>
    <div class="log-box" id="logBox">加载中...</div>
  `;
  if (state.logLevel) document.getElementById('logLevel').value = state.logLevel;
  fetchLogs();
}

function updateLogLevel(v) {
  state.logLevel = v;
  fetchLogs();
}

async function fetchLogs() {
  if (!state.activeRunId) return;
  const lvl = state.logLevel ? `&level=${state.logLevel}` : '';
  try {
    const logs = await api('GET', `/runs/${state.activeRunId}/logs?limit=500${lvl}`);
    const box = document.getElementById('logBox');
    if (!box) return;
    if (!logs.length) { box.innerHTML = '<span style="color:#475569">暂无日志</span>'; return; }
    box.innerHTML = logs.map(l => `
      <div class="log-line">
        <span class="log-ts">${l.ts.slice(11,19)}</span>
        <span class="log-lvl log-lvl-${l.level}">${l.level}</span>
        <span class="log-msg">${escHtml(l.msg)}</span>
      </div>
    `).join('');
    if (state.logAutoScroll) box.scrollTop = box.scrollHeight;
  } catch(e) { /* silent */ }
}

// ── Outputs tab ──────────────────────────────────────────────────────────────
function renderOutputsTab(el, run) {
  el.innerHTML = '<div style="color:#64748b;font-size:.875rem">加载中...</div>';
  api('GET', `/runs/${run.run_id}/outputs`).then(data => {
    if (!data.files || !data.files.length) {
      el.innerHTML = '<div style="color:#64748b;font-size:.875rem">暂无输出文件</div>';
      return;
    }
    el.innerHTML = `<div class="output-grid">${data.files.map(f => `
      <div class="output-card">
        <div class="output-card-name">${escHtml(f.filename)}</div>
        <div class="output-card-size">${fmtBytes(f.size_bytes)}</div>
        <a href="/runs/${run.run_id}/outputs/${encodeURIComponent(f.filename)}" download="${escHtml(f.filename)}">
          ↓ 下载
        </a>
      </div>
    `).join('')}</div>`;
  }).catch(() => {
    el.innerHTML = '<div style="color:#f87171;font-size:.875rem">加载失败</div>';
  });
}

// ── Polling ──────────────────────────────────────────────────────────────────
function schedulePoll() {
  clearPoll();
  state.pollTimer = setInterval(async () => {
    await refreshDetail();
    if (state.activeTab === 'logs') fetchLogs();
  }, 4000);
}
function clearPoll() {
  if (state.pollTimer) { clearInterval(state.pollTimer); state.pollTimer = null; }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function badgeClass(s) {
  return {starting:'badge-starting', running:'badge-running', awaiting_approval:'badge-awaiting',
          completed:'badge-completed', failed:'badge-failed', aborted:'badge-aborted'}[s] || 'badge-starting';
}
function statusLabel(s) {
  return {starting:'启动中', running:'运行中', awaiting_approval:'待审批',
          completed:'已完成', failed:'失败', aborted:'已终止'}[s] || s;
}
function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
}
function fmtBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  await loadRuns();
  // Refresh run list every 10s
  setInterval(loadRuns, 10000);
})();
</script>
