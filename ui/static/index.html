<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto-PI Research Engine v0.4.0</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; color: #a78bfa; }
    header span { font-size: 0.85rem; color: #64748b; }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100vh - 57px);
    }

    /* ── Sidebar ── */
    .sidebar {
      background: #1a1d27;
      border-right: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .new-run-form {
      padding: 20px;
      border-bottom: 1px solid #2d3148;
    }
    .new-run-form h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: .08em; color: #64748b; margin-bottom: 12px; }
    .form-grid { display: grid; gap: 8px; }
    .field-label { font-size: .75rem; color: #94a3b8; margin-top: 6px; display:block; }
    .input, select {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 8px 10px;
      font-size: .82rem;
    }
    .checkbox-row { display:flex; align-items:center; gap:8px; font-size:.8rem; color:#cbd5e1; }
    .expect-box { margin-top:8px; padding:8px; border:1px solid #2d3148; border-radius:8px; font-size:.75rem; color:#94a3b8; }

    textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 10px 12px;
      font-size: 0.9rem;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #7c3aed; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: #7c3aed; color: #fff; width: 100%; margin-top: 10px; }
    .btn-primary:not(:disabled):hover { background: #6d28d9; }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-success:not(:disabled):hover { background: #15803d; }
    .btn-danger  { background: #dc2626; color: #fff; }
    .btn-danger:not(:disabled):hover  { background: #b91c1c; }
    .btn-ghost   { background: #2d3148; color: #cbd5e1; }
    .btn-ghost:not(:disabled):hover   { background: #374160; }

    .run-list { flex: 1; overflow-y: auto; padding: 12px; }
    .run-list h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: .08em; color: #64748b; margin-bottom: 8px; padding: 0 4px; }

    .run-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      margin-bottom: 6px;
      transition: background .12s;
    }
    .run-item:hover { background: #252840; }
    .run-item.active { background: #252840; border-color: #7c3aed; }
    .run-item-domain { font-size: 0.875rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .run-item-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .run-item-time { font-size: 0.75rem; color: #64748b; }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .badge-starting   { background: #1e3a5f; color: #60a5fa; }
    .badge-running    { background: #1a3a2a; color: #4ade80; }
    .badge-awaiting   { background: #3b2700; color: #fbbf24; }
    .badge-completed  { background: #1a3a2a; color: #34d399; }
    .badge-failed     { background: #3b1111; color: #f87171; }
    .badge-aborted    { background: #2a2a2a; color: #94a3b8; }

    /* ── Main panel ── */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #475569;
      gap: 12px;
    }
    .empty-state svg { opacity: .3; }
    .empty-state p { font-size: 0.95rem; }

    .detail-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .detail-header {
      padding: 20px 28px 16px;
      border-bottom: 1px solid #2d3148;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }
    .detail-header-left h2 { font-size: 1.05rem; font-weight: 600; margin-bottom: 6px; }
    .detail-header-left .meta { font-size: 0.8rem; color: #64748b; }
    .detail-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #2d3148;
      padding: 0 28px;
    }
    .tab {
      padding: 10px 16px;
      font-size: 0.875rem;
      cursor: pointer;
      color: #64748b;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .12s;
    }
    .tab:hover { color: #cbd5e1; }
    .tab.active { color: #a78bfa; border-bottom-color: #7c3aed; }

    .tab-content { flex: 1; overflow-y: auto; padding: 20px 28px; }

    /* HITL banner */
    .hitl-banner {
      margin-bottom: 20px;
      background: #2a1f00;
      border: 1px solid #78350f;
      border-radius: 10px;
      padding: 16px 20px;
    }
    .hitl-banner h3 { color: #fbbf24; font-size: 0.95rem; margin-bottom: 6px; }
    .hitl-banner p  { font-size: 0.85rem; color: #d97706; margin-bottom: 12px; }
    .hitl-actions { display: flex; gap: 10px; }

    /* Status card */
    .status-card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }
    .status-card h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: .08em; color: #64748b; margin-bottom: 10px; }
    .kv-grid { display: grid; grid-template-columns: 130px 1fr; gap: 6px 12px; font-size: 0.875rem; }
    .kv-label { color: #64748b; }
    .kv-value { color: #e2e8f0; word-break: break-all; }

    /* Progress steps */
    .pipeline-steps { display: flex; gap: 0; margin-bottom: 16px; }
    .step {
      flex: 1;
      text-align: center;
      padding: 10px 4px;
      font-size: 0.75rem;
      background: #1a1d27;
      border: 1px solid #2d3148;
      color: #475569;
      position: relative;
    }
    .step:first-child { border-radius: 8px 0 0 8px; }
    .step:last-child  { border-radius: 0 8px 8px 0; }
    .step + .step { border-left: none; }
    .step.done    { background: #1a3a2a; color: #4ade80; border-color: #166534; }
    .step.active  { background: #1e2d4a; color: #60a5fa; border-color: #1d4ed8; }
    .step.waiting { background: #2a1f00; color: #fbbf24; border-color: #78350f; }

    /* Logs */
    .log-toolbar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
    .log-filter {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #e2e8f0;
      padding: 5px 10px;
      font-size: 0.8rem;
    }
    .log-filter:focus { outline: none; border-color: #7c3aed; }
    .log-auto-label { font-size: 0.8rem; color: #64748b; display: flex; align-items: center; gap: 6px; margin-left: auto; }

    .log-box {
      background: #0a0c12;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 12px;
      font-family: "JetBrains Mono", "Fira Code", monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      overflow-y: auto;
      max-height: 460px;
    }
    .log-line { display: flex; gap: 10px; }
    .log-ts   { color: #475569; flex-shrink: 0; }
    .log-lvl  { flex-shrink: 0; width: 52px; font-weight: 600; }
    .log-lvl-INFO  { color: #60a5fa; }
    .log-lvl-WARNING { color: #fbbf24; }
    .log-lvl-ERROR { color: #f87171; }
    .log-lvl-DEBUG { color: #94a3b8; }
    .log-msg  { color: #cbd5e1; }

    /* Outputs */
    .output-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .output-card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .output-card-name { font-size: 0.875rem; font-weight: 500; word-break: break-all; }
    .output-card-size { font-size: 0.75rem; color: #64748b; }
    .output-card a {
      margin-top: 4px;
      font-size: 0.8rem;
      color: #a78bfa;
      text-decoration: none;
    }
    .output-card a:hover { text-decoration: underline; }
    .candidate-grid { display:grid; grid-template-columns: repeat(auto-fill,minmax(300px,1fr)); gap: 12px; }
    .candidate-card { background:#1a1d27; border:1px solid #2d3148; border-radius:10px; padding:12px; display:flex; flex-direction:column; gap:6px; }
    .candidate-title { font-weight:600; font-size:.9rem; }
    .badge-low { background:#1a3a2a; color:#4ade80; }
    .badge-medium { background:#3b2700; color:#fbbf24; }
    .badge-high { background:#3b1111; color:#f87171; }

    /* Candidate card extras */
    .tag { display:inline-block; font-size:.68rem; padding:1px 6px; border-radius:4px; background:#1e2d4a; color:#60a5fa; margin:1px 2px 1px 0; }
    .dev-pack-ready { color:#34d399; font-size:.75rem; }
    .dev-pack-none  { color:#475569; font-size:.75rem; }
    .gate-ok   { color:#4ade80; font-size:.75rem; }
    .gate-warn { color:#fbbf24; font-size:.75rem; }
    .gate-fail { color:#f87171; font-size:.75rem; }
    .warn-box        { background:#3b1111; border:1px solid #7f1d1d; border-radius:6px; padding:8px 12px; font-size:.8rem; color:#f87171; margin:6px 0; }
    .warn-box-orange { background:#2a1f00; border:1px solid #92400e; border-radius:6px; padding:8px 12px; font-size:.8rem; color:#fbbf24; margin:6px 0; }

    /* Executability status badges */
    .exec-ready   { display:inline-block; padding:2px 8px; border-radius:4px; font-size:.72rem; font-weight:600; background:#1a3a2a; color:#4ade80; }
    .exec-review  { display:inline-block; padding:2px 8px; border-radius:4px; font-size:.72rem; font-weight:600; background:#3b2700; color:#fbbf24; }
    .exec-blocked { display:inline-block; padding:2px 8px; border-radius:4px; font-size:.72rem; font-weight:600; background:#3b1111; color:#f87171; }
    /* Reason severity colors in HITL cards */
    .reason-blocker { font-size:.76rem; color:#f87171; }
    .reason-review  { font-size:.76rem; color:#fbbf24; }
    .reason-info    { font-size:.76rem; color:#64748b; }
    /* Design row in HITL card */
    .design-row { font-size:.78rem; color:#94a3b8; display:flex; gap:6px; flex-wrap:wrap; }
    .design-row strong { color:#cbd5e1; }

    /* Confirmation modal */
    .confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:1100; display:flex; align-items:center; justify-content:center; }
    .confirm-box { background:#1a1d27; border:1px solid #334155; border-radius:12px; padding:24px; max-width:440px; width:90%; }
    .confirm-box h3 { font-size:.95rem; margin-bottom:8px; color:#e2e8f0; }
    .confirm-box p  { font-size:.85rem; color:#94a3b8; margin-bottom:16px; line-height:1.55; }
    .confirm-actions { display:flex; gap:10px; justify-content:flex-end; }

    /* Outputs semantic groups */
    .output-group-label { font-size:.8rem; text-transform:uppercase; letter-spacing:.06em; color:#64748b; margin:16px 0 10px; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      width: 92vw;
      max-width: 960px;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid #2d3148;
      flex-shrink: 0;
    }
    .modal-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #a78bfa;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      font-size: 0.85rem;
      line-height: 1.6;
    }
    .modal-body pre {
      white-space: pre-wrap;
      word-break: break-all;
      font-family: "JetBrains Mono", "Fira Code", monospace;
      font-size: 0.8rem;
      line-height: 1.55;
      color: #cbd5e1;
    }
    .modal-body .json-key    { color: #a78bfa; }
    .modal-body .json-str    { color: #34d399; }
    .modal-body .json-num    { color: #60a5fa; }
    .modal-body .json-bool   { color: #fbbf24; }
    .modal-body .json-null   { color: #94a3b8; }
    .modal-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    .modal-body th, .modal-body td {
      padding: 7px 12px;
      border: 1px solid #2d3148;
      text-align: left;
    }
    .modal-body th { background: #252840; color: #a78bfa; font-weight: 600; }
    .modal-body tr:nth-child(even) { background: #1a1d27; }
    .modal-body tr:nth-child(odd)  { background: #15171f; }
    .modal-body .md-content h1 { font-size: 1.4rem; font-weight: 700; margin: 16px 0 8px; color: #e2e8f0; }
    .modal-body .md-content h2 { font-size: 1.15rem; font-weight: 600; margin: 14px 0 6px; color: #e2e8f0; }
    .modal-body .md-content h3 { font-size: 1rem; font-weight: 600; margin: 12px 0 4px; color: #e2e8f0; }
    .modal-body .md-content p  { margin: 6px 0; color: #cbd5e1; }
    .modal-body .md-content ul, .modal-body .md-content ol { padding-left: 24px; margin: 6px 0; }
    .modal-body .md-content li { margin: 3px 0; color: #cbd5e1; }
    .modal-body .md-content code {
      background: #252840;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: "JetBrains Mono", "Fira Code", monospace;
      font-size: 0.82rem;
    }
    .modal-body .md-content pre {
      background: #0a0c12;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 12px;
      margin: 8px 0;
    }
    .modal-body .md-content pre code { background: none; padding: 0; }
    .modal-body .md-content blockquote {
      border-left: 3px solid #7c3aed;
      padding-left: 12px;
      margin: 8px 0;
      color: #94a3b8;
    }
    .modal-body .md-content strong { font-weight: 600; color: #e2e8f0; }
    .modal-body .md-content em { font-style: italic; color: #cbd5e1; }
    .modal-body .md-content a { color: #a78bfa; }
    .modal-body .truncation-notice {
      margin-top: 12px;
      padding: 10px 14px;
      background: #2a1f00;
      border: 1px solid #78350f;
      border-radius: 8px;
      color: #fbbf24;
      font-size: 0.82rem;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 0.875rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      z-index: 999;
      max-width: 320px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.error { border-color: #991b1b; color: #fca5a5; }
    #toast.success { border-color: #166534; color: #86efac; }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #4ade8044;
      border-top-color: #4ade80;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }

    /* ── Mobile responsive ── */
    @media (max-width: 768px) {
      header { padding: 12px 16px; }
      header span { font-size: 0.75rem; }

      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        height: auto;
        min-height: calc(100vh - 49px);
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid #2d3148;
        max-height: none;
      }
      .new-run-form { padding: 14px 16px; }
      .run-list { max-height: 200px; padding: 8px; }

      .main { min-height: 60vh; }

      .detail-header {
        padding: 14px 16px 12px;
        flex-direction: column;
        gap: 8px;
        align-items: stretch;
      }
      .detail-actions { flex-wrap: wrap; }

      .tabs { padding: 0 16px; }
      .tab { padding: 10px 12px; font-size: 0.82rem; }
      .tab-content { padding: 14px 16px; }

      .pipeline-steps { flex-wrap: wrap; gap: 4px; }
      .step {
        flex: 1 1 auto;
        min-width: 80px;
        border-radius: 6px !important;
        border-left: 1px solid #2d3148 !important;
      }
      .step.done  { border-left-color: #166534 !important; }
      .step.active { border-left-color: #1d4ed8 !important; }
      .step.waiting { border-left-color: #78350f !important; }

      .kv-grid { grid-template-columns: 100px 1fr; }

      .hitl-actions { flex-direction: column; }
      .hitl-actions .btn { width: 100%; }

      .log-box { max-height: 300px; }
      .modal { width: 98vw; max-height: 92vh; }
    }
  </style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
  </svg>
  <h1>Auto-PI Research Engine</h1>
  <span>Multi-Agent Academic Research Pipeline &nbsp;v0.4.0</span>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="new-run-form">
      <h2>新建研究任务</h2>
      <div class="form-grid">
        <textarea id="domainInput" placeholder="输入研究方向，例如：Built environment exposure and health outcomes">Built environment exposure and health outcomes</textarea>
        <label class="field-label">Research template</label>
        <select id="templateSelect" class="input" onchange="onTemplateChange(this.value)"></select>
        <label class="field-label">Automation risk tolerance</label>
        <select id="riskTolerance" class="input">
          <option value="low_medium">Low + medium</option>
          <option value="low_only">Low only</option>
          <option value="experimental">Experimental</option>
        </select>
        <div id="spatialOptions">
        <label class="checkbox-row"><input type="checkbox" id="optOsmnx" checked> OSMnx</label>
        <label class="checkbox-row"><input type="checkbox" id="optRemoteSensing" checked> Remote sensing</label>
        <label class="checkbox-row"><input type="checkbox" id="optMsBuilding" checked> Microsoft building footprints</label>
        <label class="checkbox-row"><input type="checkbox" id="optStreetView"> Street view CV</label>
        <label class="checkbox-row"><input type="checkbox" id="optDL"> Deep learning</label>
        <label class="checkbox-row"><input type="checkbox" id="ccNoPaidApi" checked> No paid API</label>
        <label class="checkbox-row"><input type="checkbox" id="ccNoRawImage" checked> No raw image storage</label>
        <label class="checkbox-row"><input type="checkbox" id="ccNoManual" checked> No manual download</label>
        <label class="checkbox-row"><input type="checkbox" id="ccNoGpu" checked> No GPU</label>
        </div>
        <div id="llmOptions" style="display:none">
        <label class="field-label">GPU runtime tier</label>
        <select id="runtimeTier" class="input">
          <option value="colab_t4">Colab T4 (16 GB) — LoRA≤1.5B / QLoRA≤7B</option>
          <option value="colab_a100">Colab A100 (40 GB) — full SFT up to 7B</option>
          <option value="local_gpu">Local GPU (user-supplied)</option>
        </select>
        <div style="font-size:.75rem;color:#94a3b8;margin-top:4px">HF_TOKEN required at notebook runtime (free HuggingFace account)</div>
        </div>
        <label class="checkbox-row"><input type="checkbox" id="enableExperimental"> Enable experimental</label>
        <label class="field-label">Number of candidates</label>
        <select id="maxCandidates" class="input">
          <option value="20">20</option>
          <option value="40" selected>40 (default)</option>
          <option value="60">60</option>
        </select>
      </div>
      <div id="expectBox" class="expect-box">
        Expected output: up to 40 candidates · Sources: OSMnx/CDC PLACES/ACS/TIGER/EPA/NLCD · Development pack enabled
      </div>
      <button class="btn btn-primary" id="startBtn" onclick="startRun()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        启动研究
      </button>
    </div>
    <div class="run-list">
      <h2>历史任务</h2>
      <div id="runList"></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <div class="empty-state" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
      <p>选择或启动一个研究任务</p>
    </div>
    <div class="detail-panel" id="detailPanel" style="display:none"></div>
  </main>
</div>

<div id="toast"></div>

<!-- High-risk / paid-API confirmation modal -->
<div class="confirm-overlay" id="confirmModal" style="display:none" onclick="if(event.target===this)closeConfirmModal()">
  <div class="confirm-box">
    <h3 id="confirmTitle">Confirm Selection</h3>
    <p id="confirmMsg"></p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" onclick="closeConfirmModal()">Cancel</button>
      <button class="btn btn-danger" id="confirmOkBtn">Confirm</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="fileModal" style="display:none" onclick="if(event.target===this)closeFileModal()">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <div style="display:flex;gap:8px;align-items:center">
        <a id="modalDownload" class="btn btn-ghost" style="padding:5px 12px;font-size:.78rem;text-decoration:none" download>下载</a>
        <button class="btn btn-ghost" onclick="closeFileModal()" style="padding:5px 10px;font-size:.9rem">✕</button>
      </div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const PIPELINE_NODES = ['field_scanner','ideation','literature','drafter','data_fetcher'];

let state = {
  runs: [],
  templates: [],
  activeRunId: null,
  pollTimer: null,
  logTimer: null,
  activeTab: 'status',
  selectedCandidateId: null,
  candidates: [],
  logAutoScroll: true,
  logLevel: '',
  cloudConstraints: {},
};

// ── API helpers ─────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({detail: res.statusText}));
    throw new Error(err.detail || res.statusText);
  }
  return res.json();
}

// ── Toast ───────────────────────────────────────────────────────────────────
let _toastTimer;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.className = '', 3000);
}

// ── Template-aware sidebar toggle ───────────────────────────────────────────
function onTemplateChange(templateId) {
  const isLlm = templateId === 'llm_training_research';
  const spatial = document.getElementById('spatialOptions');
  const llm = document.getElementById('llmOptions');
  if (spatial) spatial.style.display = isLlm ? 'none' : '';
  if (llm) llm.style.display = isLlm ? '' : 'none';
  const expectBox = document.getElementById('expectBox');
  if (expectBox) {
    expectBox.textContent = isLlm
      ? 'Expected output: up to 40 candidates · Sources: HuggingFace Models/Datasets + Training Logs · Colab dev pack (experiment_config.yaml + training_plan.yaml + colab_notebook_spec.md)'
      : 'Expected output: up to 40 candidates · Sources: OSMnx/CDC PLACES/ACS/TIGER/EPA/NLCD · Development pack enabled';
  }
}

// ── Sidebar run list ────────────────────────────────────────────────────────
async function loadRuns() {
  try {
    state.runs = await api('GET', '/runs');
    renderRunList();
  } catch(e) { /* silent */ }
}

async function loadTemplates() {
  try {
    const data = await api('GET', '/templates');
    state.templates = data.templates || [];
    const sel = document.getElementById('templateSelect');
    if (!sel) return;
    sel.innerHTML = state.templates.map(t => `<option value="${escAttr(t.file_id || t.template_id)}">${escHtml(t.template_id || t.file_id)}</option>`).join('');
    const built = state.templates.find(t => (t.file_id || t.template_id) === 'built_environment_health');
    if (built) sel.value = 'built_environment_health';
    onTemplateChange(sel.value);
  } catch(e) {
    const sel = document.getElementById('templateSelect');
    if (sel) sel.innerHTML = '<option value="built_environment_health">built_environment_health</option>';
    onTemplateChange('built_environment_health');
  }
}

function renderRunList() {
  const el = document.getElementById('runList');
  if (!state.runs.length) {
    el.innerHTML = '<div style="font-size:.8rem;color:#475569;padding:8px 4px">暂无任务</div>';
    return;
  }
  el.innerHTML = state.runs.map(r => `
    <div class="run-item ${r.run_id === state.activeRunId ? 'active' : ''}"
         onclick="selectRun('${r.run_id}')">
      <div class="run-item-domain">${escHtml(r.domain_input)}</div>
      <div class="run-item-meta">
        <span class="badge ${badgeClass(r.status)}">${statusLabel(r.status)}</span>
        <span class="run-item-time">${fmtTime(r.started_at)}</span>
      </div>
    </div>
  `).join('');
}

// ── Select run ──────────────────────────────────────────────────────────────
async function selectRun(runId) {
  clearPoll();
  state.activeRunId = runId;
  state.activeTab = 'status';
  renderRunList();
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('detailPanel').style.display = 'flex';
  await refreshDetail();
  schedulePoll();
}

// ── Start run ───────────────────────────────────────────────────────────────
async function startRun() {
  const domain = document.getElementById('domainInput').value.trim();
  if (!domain) { toast('请输入研究方向', 'error'); return; }
  const btn = document.getElementById('startBtn');
  const origHTML = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 提交中...';
  try {
    const templateId = document.getElementById('templateSelect').value || 'built_environment_health';
    const isLlm = templateId === 'llm_training_research';
    const run = await api('POST', '/runs', {
      domain_input: domain,
      template_id: templateId,
      runtime_tier: isLlm ? (document.getElementById('runtimeTier')?.value || 'colab_t4') : 'colab_t4',
      technology_options: isLlm ? {} : {
        osmnx: document.getElementById('optOsmnx').checked,
        remote_sensing: document.getElementById('optRemoteSensing').checked,
        microsoft_building_footprints: document.getElementById('optMsBuilding').checked,
        streetview_cv: document.getElementById('optStreetView').checked,
        deep_learning: document.getElementById('optDL').checked,
      },
      automation_risk_tolerance: document.getElementById('riskTolerance').value,
      cloud_constraints: isLlm ? { no_paid_api: false, no_raw_image_storage: false, no_manual_download: false, no_gpu: false } : {
        no_paid_api: document.getElementById('ccNoPaidApi').checked,
        no_raw_image_storage: document.getElementById('ccNoRawImage').checked,
        no_manual_download: document.getElementById('ccNoManual').checked,
        no_gpu: document.getElementById('ccNoGpu').checked,
      },
      enable_experimental: document.getElementById('enableExperimental').checked,
      max_candidates: parseInt(document.getElementById('maxCandidates').value, 10) || 40,
    });
    state.cloudConstraints = isLlm ? { no_paid_api: false, no_raw_image_storage: false, no_manual_download: false, no_gpu: false } : {
      no_paid_api: document.getElementById('ccNoPaidApi').checked,
      no_raw_image_storage: document.getElementById('ccNoRawImage').checked,
      no_manual_download: document.getElementById('ccNoManual').checked,
      no_gpu: document.getElementById('ccNoGpu').checked,
    };
    // Push placeholder into local list so sidebar updates immediately
    state.runs.unshift(run);
    renderRunList();
    toast('任务已启动', 'success');
    selectRun(run.run_id);
    loadRuns(); // refresh list in background (no await)
  } catch(e) {
    toast('启动失败：' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = origHTML;
  }
}

// ── Detail panel ────────────────────────────────────────────────────────────
async function refreshDetail() {
  if (!state.activeRunId) return;
  try {
    const run = await api('GET', `/runs/${state.activeRunId}/status`);
    renderDetail(run);
    // update sidebar badge
    const idx = state.runs.findIndex(r => r.run_id === run.run_id);
    if (idx >= 0) { state.runs[idx].status = run.status; renderRunList(); }
    // stop polling if terminal
    if (['completed','failed','aborted'].includes(run.status)) clearPoll();
  } catch(e) { /* silent */ }
}

function renderDetail(run) {
  const panel = document.getElementById('detailPanel');
  const isHITL = run.status === 'awaiting_approval';
  const isDone = ['completed','failed','aborted'].includes(run.status);
  const isRunning = run.status === 'running' || run.status === 'starting';

  // Skip full re-render if nothing material changed — preserves in-flight UI
  // state (e.g. the user's HITL radio selection) across polls.
  const sig = `${run.run_id}|${run.status}|${run.current_node || ''}|${run.regeneration_round || 0}|${run.error || ''}|${state.activeTab}`;
  if (panel.dataset.renderSig === sig) {
    // Lightweight refresh of the active tab's live pieces only.
    if (state.activeTab === 'status') fetchMilestones();
    return;
  }
  panel.dataset.renderSig = sig;

  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-header-left">
        <h2>${escHtml(run.domain_input)}</h2>
        <div class="meta">
          Run ID: ${run.run_id}
          &nbsp;·&nbsp; 启动：${fmtTime(run.started_at)}
          ${run.completed_at ? '&nbsp;·&nbsp; 完成：' + fmtTime(run.completed_at) : ''}
        </div>
      </div>
      <div class="detail-actions">
        ${isRunning ? '<span class="spinner"></span>' : ''}
        <span class="badge ${badgeClass(run.status)}">${statusLabel(run.status)}</span>
        <button class="btn btn-ghost" onclick="refreshDetail()" title="刷新">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        </button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab ${state.activeTab==='candidate_review'?'active':''}" onclick="switchTab('candidate_review')">Candidate Review</div>
      <div class="tab ${state.activeTab==='candidate_detail'?'active':''}" onclick="switchTab('candidate_detail')">Candidate Detail</div>
      <div class="tab ${state.activeTab==='development_pack'?'active':''}" onclick="switchTab('development_pack')">Development Pack</div>
      <div class="tab ${state.activeTab==='status'?'active':''}" onclick="switchTab('status')">状态</div>
      <div class="tab ${state.activeTab==='logs'?'active':''}" onclick="switchTab('logs')">日志</div>
      <div class="tab ${state.activeTab==='outputs'?'active':''}" onclick="switchTab('outputs')">输出文件</div>
    </div>

    <div class="tab-content" id="tabContent"></div>
  `;

  renderTab(run);
}

function switchTab(tab) {
  state.activeTab = tab;
  const run = state.runs.find(r => r.run_id === state.activeRunId);
  // re-fetch full status then render
  api('GET', `/runs/${state.activeRunId}/status`).then(renderDetail).catch(()=>{});
}

function renderTab(run) {
  const el = document.getElementById('tabContent');
  if (!el) return;
  if (state.activeTab === 'candidate_review') renderCandidateReviewTab(el, run);
  else if (state.activeTab === 'candidate_detail') renderCandidateDetailTab(el, run);
  else if (state.activeTab === 'development_pack') renderDevelopmentPackTab(el, run);
  else if (state.activeTab === 'status')   renderStatusTab(el, run);
  else if (state.activeTab === 'logs')    renderLogsTab(el, run);
  else if (state.activeTab === 'outputs') renderOutputsTab(el, run);
}

async function fetchCandidates(runId) {
  const data = await api('GET', `/runs/${runId}/candidates`);
  state.candidates = data.candidates || [];
  if (!state.selectedCandidateId && state.candidates.length) {
    state.selectedCandidateId = state.candidates[0].candidate_id;
  }
  return state.candidates;
}

function riskBadge(risk) {
  if (risk === 'low') return '<span class="badge badge-low">Low risk</span>';
  if (risk === 'medium') return '<span class="badge badge-medium">Medium risk</span>';
  return '<span class="badge badge-high">High risk</span>';
}

function renderCandidateReviewTab(el, run) {
  el.innerHTML = `
    <div class="log-toolbar" style="flex-wrap:wrap;gap:6px">
      <select class="log-filter" id="candidateFilter">
        <option value="">All</option>
        <option value="ready">Ready only</option>
        <option value="low">Low risk only</option>
        <option value="no_secret">No API key required</option>
        <option value="no_paid_api">No paid API</option>
        <option value="osmnx">OSMnx</option>
        <option value="remote_sensing">Remote sensing</option>
        <option value="epa">EPA sources</option>
        <option value="cdc_places">CDC PLACES outcomes</option>
        <option value="claude_code_ready">Claude Code Ready</option>
        <option value="has_dev_pack">Has development pack</option>
        <option value="has_warnings">Has repairable warnings</option>
        <option value="blocked">Blocked</option>
      </select>
      <select class="log-filter" id="candidateSort">
        <option value="overall">Overall score</option>
        <option value="data_feasibility">Data feasibility</option>
        <option value="automation_feasibility">Automation feasibility</option>
        <option value="identification_quality">Identification quality</option>
        <option value="technology_innovation">Technology innovation</option>
        <option value="lowest_risk">Lowest risk</option>
        <option value="id">Candidate ID</option>
      </select>
      <button class="btn btn-ghost" onclick="renderCandidateReviewTab(document.getElementById('tabContent'), {run_id:'${run.run_id}'})">刷新</button>
    </div>
    <div id="candidateGrid">加载中...</div>
  `;
  fetchCandidates(run.run_id).then(() => {
    const filter = document.getElementById('candidateFilter');
    const sort = document.getElementById('candidateSort');
    const riskOrder = {low: 0, medium: 1, high: 2, unknown: 3};
    const renderCards = () => {
      let candidates = [...state.candidates];
      const fv = filter.value;
      if (fv === 'ready')      candidates = candidates.filter(c => c.shortlist_status === 'ready');
      if (fv === 'low')        candidates = candidates.filter(c => c.automation_risk === 'low');
      if (fv === 'no_secret')  candidates = candidates.filter(c => (c.required_secrets||[]).length === 0);
      if (fv === 'no_paid_api') candidates = candidates.filter(c => (c.required_secrets||[]).length === 0);
      if (fv === 'osmnx')      candidates = candidates.filter(c => (c.technology_tags||[]).includes('osmnx'));
      if (fv === 'remote_sensing') candidates = candidates.filter(c => (c.technology_tags||[]).some(t => t.includes('remote_sensing') || t.includes('remote')));
      if (fv === 'epa')        candidates = candidates.filter(c => (c.exposure_source||'').toLowerCase().includes('epa') || (c.outcome_source||'').toLowerCase().includes('epa') || (c.technology_tags||[]).some(t => t.toLowerCase().includes('epa')));
      if (fv === 'cdc_places') candidates = candidates.filter(c => (c.outcome_source||'').toLowerCase().includes('cdc') || (c.outcome_source||'').toLowerCase().includes('places'));
      if (fv === 'claude_code_ready') candidates = candidates.filter(c => c.claude_code_ready === true);
      if (fv === 'has_dev_pack')  candidates = candidates.filter(c => c.development_pack_status === 'ready');
      if (fv === 'has_warnings')  candidates = candidates.filter(c => (c.gate_summary?.warning_count||0) > 0 && c.shortlist_status !== 'blocked');
      if (fv === 'blocked')    candidates = candidates.filter(c => c.shortlist_status === 'blocked');
      const sv = sort.value;
      if (sv === 'id')         candidates.sort((a,b) => (a.candidate_id||'').localeCompare(b.candidate_id||''));
      else if (sv === 'lowest_risk') candidates.sort((a,b) => (riskOrder[a.automation_risk]||3) - (riskOrder[b.automation_risk]||3));
      else                     candidates.sort((a,b) => (b.scores?.[sv]||0) - (a.scores?.[sv]||0));
      document.getElementById('candidateGrid').innerHTML = `<div class="candidate-grid">${
        candidates.map(c => {
          const gs = c.gate_summary || {};
          const gateHtml = gs.failed_count > 0
            ? `<span class="gate-fail">✗ ${gs.failed_count} gate failed</span>`
            : gs.warning_count > 0
              ? `<span class="gate-warn">⚠ ${gs.warning_count} warning${gs.warning_count > 1 ? 's' : ''}</span>`
              : '<span class="gate-ok">✓ All gates pass</span>';
          const tagsHtml = (c.technology_tags||[]).map(t => `<span class="tag">${escHtml(t)}</span>`).join('');
          const isExperimental = (c.technology_tags||[]).some(t => ['streetview_cv','deep_learning','satellite_cv','experimental'].includes(t));
          // Stage 2 generates the dev pack only after selection.  Until then,
          // show a neutral placeholder so the picker doesn't lie about pack
          // readiness for unselected candidates.
          const dpHtml = c.claude_code_ready
            ? '<span class="badge badge-completed" style="font-size:.75rem">Claude Code Ready</span>'
            : c.development_pack_status === 'ready'
              ? '<span class="badge badge-completed" style="font-size:.75rem">Pack Ready</span>'
              : c.development_pack_status === 'review_required'
                ? '<span class="badge badge-awaiting" style="font-size:.75rem">Review Required</span>'
                : isExperimental
                  ? '<span class="badge badge-high" style="font-size:.75rem">Experimental Review Required</span>'
                  : '<span style="font-size:.75rem;color:#64748b">Pack: generated after you select</span>';
          const noveltyHtml = c.novelty_status === 'pending_literature_check'
            ? '<span style="font-size:.78rem;color:#94a3b8">Novelty: pending literature check</span>'
            : '';
          const hasSecrets = (c.required_secrets||[]).length > 0;
          const secretsHtml = hasSecrets
            ? `<div style="font-size:.78rem;color:#fbbf24">⚠ Required secrets: ${escHtml((c.required_secrets||[]).join(', '))}</div>`
            : '<div style="font-size:.78rem;color:#86efac">Required secrets: none</div>';
          const isBlocked = c.readiness === 'blocked';
          const blockedReasons = (c.user_visible_reasons||[]);
          const blockedTip = isBlocked
            ? (blockedReasons.length ? blockedReasons[0] : '当前模板下不可执行')
            : '';
          const selectDisabled = isBlocked
            ? `disabled title="${escAttr(blockedTip || '当前模板下不可执行')}"` : '';
          const copyPromptBtn = c.claude_code_ready
            ? `<button class="btn btn-primary" onclick="copyClaudePrompt('${run.run_id}','${escAttr(c.candidate_id)}')">Copy Task Prompt</button>`
            : '';
          const blockedBannerHtml = isBlocked
            ? `<div style="margin-top:6px;padding:6px 10px;background:#3b1111;border:1px solid #7f1d1d;border-radius:6px;font-size:.78rem;color:#f87171">
                ✗ 不可执行：${escHtml(blockedTip || '当前模板约束下无法自动运行，仅作诊断用途')}
               </div>`
            : '';
          // Two-layer display: research-question title (Layer 1) + folded
          // execution_summary (Layer 2) hidden behind a <details> toggle.
          const display = c.display || {};
          const displayTitle = display.display_title || c.title || '';
          const displayQuestion = display.research_question || c.research_question || '';
          const displayRationale = display.rationale || '';
          const displayContribution = display.contribution_angle || '';
          const isTraining = c.unit_of_analysis === 'training_run';
          const executionSummary = display.execution_summary
            || (isTraining
              ? `Strategy: ${c.exposure_source||'?'} → Target: ${c.outcome_source||'?'} · Method: ${c.method||'?'}`
              : `Sources: ${c.exposure_source||'?'} + ${c.outcome_source||'?'} · Method: ${c.method||'?'} · Grain: ${c.unit_of_analysis||'?'}`);
          const xLabel = isTraining ? 'Strategy' : 'X';
          const yLabel = isTraining ? 'Target' : 'Y';
          const hasHfToken = hasSecrets && (c.required_secrets||[]).every(s => s === 'HF_TOKEN');
          const secretsNoticePaid = hasSecrets
            ? (hasHfToken
              ? `<div style="font-size:.78rem;color:#fbbf24">⚠ Requires HF_TOKEN (free, provided at notebook runtime)</div>`
              : `<div style="font-size:.78rem;color:#fbbf24">⚠ Required secrets: ${escHtml((c.required_secrets||[]).join(', '))}</div>`)
            : '<div style="font-size:.78rem;color:#86efac">Required secrets: none</div>';
          return `
          <div class="candidate-card" style="${isBlocked ? 'opacity:.65;border-color:#7f1d1d' : ''}">
            <div style="display:flex;gap:4px;flex-wrap:wrap">${statusBadge(c.readiness || c.shortlist_status)} ${riskBadge(c.automation_risk)} ${gateHtml}</div>
            ${isTraining ? '<span class="badge" style="background:#1e2d4a;color:#60a5fa;font-size:.68rem">LLM Training</span>' : ''}
            <div class="candidate-title">${escHtml(displayTitle)}</div>
            ${displayQuestion ? `<div style="font-size:.8rem;color:#94a3b8">${escHtml(displayQuestion)}</div>` : ''}
            ${displayRationale ? `<div style="font-size:.78rem;color:#cbd5e1">${escHtml(displayRationale)}</div>` : ''}
            ${noveltyHtml}
            <details style="margin-top:4px">
              <summary style="cursor:pointer;font-size:.78rem;color:#94a3b8">Show execution details (sources · method · grain)</summary>
              <div style="margin-top:6px;padding:8px;background:#0f172a;border-radius:6px;font-size:.78rem;line-height:1.45">
                <div style="color:#cbd5e1">${escHtml(executionSummary)}</div>
                <div style="margin-top:4px">${xLabel}: ${escHtml(c.exposure_label||'')} · <em>${escHtml(c.exposure_source||'')}</em></div>
                <div>${yLabel}: ${escHtml(c.outcome_label||'')} · <em>${escHtml(c.outcome_source||'')}</em></div>
                <div>Unit: ${escHtml(c.unit_of_analysis||'')} · Method: ${escHtml(c.method||'')}</div>
                ${displayContribution ? `<div style="margin-top:4px;color:#94a3b8">Angle: ${escHtml(displayContribution)}</div>` : ''}
              </div>
            </details>
            <div style="font-size:.8rem;display:flex;gap:10px;flex-wrap:wrap">
              <span>Overall: <strong>${Math.round((c.scores?.overall||0)*100)}</strong></span>
              <span>Data: ${Math.round((c.scores?.data_feasibility||0)*100)}</span>
              <span>Auto: ${Math.round((c.scores?.automation_feasibility||0)*100)}</span>
              <span>ID: ${Math.round((c.scores?.identification_quality||0)*100)}</span>
            </div>
            ${secretsNoticePaid}
            ${blockedBannerHtml}
            ${tagsHtml ? `<div style="margin-top:2px">${tagsHtml}</div>` : ''}

const MAX_REGEN_ROUNDS = 3;

// Align validated ideas with topic_screening.candidates so the picker index
// matches what apply_idea_selection() will operate on. Mirrors the backend
// helper in agents/hitl_helpers.py: dedupe by title (substitute beats failed
// original), fall back to non-failed only, last-resort to all entries — never
// returns empty when the validation report has any ideas.
// Returns enriched ideas that include fields from the screening candidate:
//   _executability_status, _exposure_source, _outcome_source,
//   _method, _claim_strength, _key_threats, _exposure_specific, _outcome_specific
async function alignIdeasWithScreening(runId, allIdeas) {
  if (!Array.isArray(allIdeas) || allIdeas.length === 0) return [];
  let screeningCandidates = [];
  try {
    const url = `/runs/${runId}/outputs/${encodePath('output/topic_screening.json')}`;
    const res = await fetch(url);
    if (res.ok) {
      const data = await res.json();
      screeningCandidates = Array.isArray(data.candidates) ? data.candidates : [];
    }
  } catch (_) { /* fall through */ }

  // Build a map from title → screening candidate for enrichment
  const screeningByTitle = new Map();
  for (const c of screeningCandidates) {
    const t = String(c.title || '');
    if (t) screeningByTitle.set(t, c);
  }

  // Dedupe validated ideas by title (substitute beats failed original)
  const byTitle = new Map();
  for (const idea of allIdeas) {
    const title = String(idea.title || '');
    if (!title) continue;
    const prev = byTitle.get(title);
    if (!prev) { byTitle.set(title, idea); }
    else if (prev.overall_verdict === 'failed' && idea.overall_verdict !== 'failed') {
      byTitle.set(title, idea);
    }
  }

  // Produce aligned list in screening order, enriched with screening candidate fields
  const enrich = (idea) => {
    const sc = screeningByTitle.get(String(idea.title || '')) || {};
    const ev = sc.evaluation || {};
    const reasons = Array.isArray(ev.reasons) ? ev.reasons : [];
    return {
      ...idea,
      _executability_status: ev.executability_status || _deriveExecStatus(ev.overall_verdict, reasons),
      _exposure_source: sc.exposure_source || '',
      _outcome_source: sc.outcome_source || '',
      _exposure_specific: sc.exposure_specific || sc.exposure_variable || '',
      _outcome_specific: sc.outcome_specific || sc.outcome_variable || '',
      _method: sc.method || '',
      _claim_strength: sc.claim_strength || '',
      _key_threats: Array.isArray(sc.key_threats) ? sc.key_threats : [],
      _eval_reasons: reasons,
    };
  };

  if (screeningCandidates.length) {
    const screeningTitles = screeningCandidates.map(c => String(c.title || ''));
    const aligned = screeningTitles.filter(t => byTitle.has(t)).map(t => enrich(byTitle.get(t)));
    if (aligned.length) return aligned;
  }

  const nonFailed = allIdeas.filter(idea => idea.overall_verdict !== 'failed');
  const base = nonFailed.length ? nonFailed : allIdeas;
  return base.map(enrich);
}

// Derive executability status from overall_verdict + reasons when backend field is absent
function _deriveExecStatus(overall, reasons) {
  const BLOCKERS = new Set(['missing_exposure_role_source','missing_outcome_role_source',
    'missing_machine_readable_source','no_data_sources_declared','missing_join_path']);
  if (overall === 'fail' || reasons.some(r => BLOCKERS.has(r))) return 'blocked';
  if (overall === 'warning') return 'needs_review';
  return 'ready';
}

// Reason severity classifier
const _BLOCKER_REASONS = new Set(['missing_exposure_role_source','missing_outcome_role_source',
  'missing_machine_readable_source','no_data_sources_declared','missing_join_path']);
const _REVIEW_REASONS = new Set(['missing_identification_method','missing_identification_threats',
  'partial_literature_overlap','already_published_overlap','short_rationale_too_brief',
  'research_question_too_brief','geography_incompatible','time_window_incompatible',
  'missing_training_logs_control','hf_token_required_at_runtime','gpu_runtime_capacity_warning']);
const _INFO_REASONS = new Set(['source_alias_resolved','non_canonical_source_name',
  'canonicalize_source_name','partial_registry_match','novelty_evidence_limited',
  'url_not_reachable','no_access_url','experimental_source_requires_key']);

function _reasonSeverity(r) {
  if (_BLOCKER_REASONS.has(r)) return 'blocker';
  if (_REVIEW_REASONS.has(r)) return 'review';
  return 'info';
}

async function renderHitlPicker(run) {
  const container = document.getElementById('hitlPicker');
  if (!container) return;

  // HITL#2: novelty overlap confirmation (different panel, no candidate picker)
  if (run.current_node === 'novelty_review') {
    return renderNoveltyReviewPanel(run);
  }

  const round = Number(run.regeneration_round || 0);
  if (container.dataset.round === String(round) && container.dataset.ready === '1') return;
  container.dataset.round = String(round);
  container.dataset.hitlKind = 'candidate_pick';
  container.dataset.ready = '0';
  container.innerHTML = '<div style="color:#94a3b8">加载候选选题…</div>';

  // Two-stage flow: HITL#1 reads topic_screening.json directly (the
  // candidate factory no longer writes idea_validation.json since the
  // idea_validator node has been removed from the default graph).
  // Fall back to idea_validation.json when present (legacy/V0 runs).
  let ideas = [];
  let speculativeIdeas = [];
  try {
    const screeningUrl = `/runs/${run.run_id}/outputs/${encodePath('output/topic_screening.json')}`;
    const sres = await fetch(screeningUrl);
    if (sres.ok) {
      const sdata = await sres.json();
      const screeningCandidates = Array.isArray(sdata.candidates) ? sdata.candidates : [];
      const speculativeCandidates = Array.isArray(sdata.speculative_candidates) ? sdata.speculative_candidates : [];
      ideas = screeningCandidates.map(c => ({
        title: c.title || '',
        brief_rationale: c.brief_rationale || (c.display && c.display.rationale) || '',
        rank: c.rank || 0,
        // Stage 1 has no novelty verdict yet — surface placeholder.
        novelty: { verdict: c.novelty_status || 'pending_literature_check' },
        failure_reasons: (c.evaluation && c.evaluation.user_visible_reasons) || [],
        overall_verdict: (c.evaluation && c.evaluation.overall_verdict) || 'pending',
        // Enrichment fields the renderer reads:
        _executability_status:
          c.readiness === 'ready' || c.readiness === 'ready_after_auto_fix' ? 'ready'
          : c.readiness === 'blocked' ? 'blocked' : 'needs_review',
        _exposure_source: c.exposure_source || '',
        _outcome_source: c.outcome_source || '',
        _exposure_specific: c.exposure_variable || c.exposure_family || '',
        _outcome_specific: c.outcome_variable || c.outcome_family || '',
        _method: c.method || '',
        _claim_strength: c.claim_strength || '',
        _key_threats: Array.isArray(c.key_threats) ? c.key_threats : [],
        _eval_reasons: (c.evaluation && c.evaluation.user_visible_reasons) || [],
        _candidate_id: c.candidate_id || c.topic_id || '',
        _display: c.display || {},
        _unit_of_analysis: c.unit_of_analysis || '',
      }));
      speculativeIdeas = speculativeCandidates.map(c => ({
        title: c.polished_title || c.title || '',
        brief_rationale: c.brief_rationale || (c.display && c.display.rationale) || '',
        rank: c.rank || 0,
        _executability_status: 'blocked',
        _exposure_source: c.exposure_source || '',
        _outcome_source: c.outcome_source || '',
        _exposure_specific: c.exposure_variable || c.exposure_family || '',
        _outcome_specific: c.outcome_variable || c.outcome_family || '',
        _method: c.method || '',
        _candidate_id: c.candidate_id || c.topic_id || '',
        _display: c.display || {},
        _unlock_requirements: Array.isArray(c.unlock_requirements) ? c.unlock_requirements : [],
        _technology_tags: Array.isArray(c.technology_tags) ? c.technology_tags : [],
        _why_speculative: c.why_speculative || '',
      }));
      // Approval picker shows Ready + Needs Review only.  Blocked
      // candidates are diagnostic-only and hidden here.
      ideas = ideas.filter(i => i._executability_status !== 'blocked');
    } else {
      throw new Error('topic_screening.json missing');
    }
  } catch (_) {
    try {
      const url = `/runs/${run.run_id}/outputs/${encodePath('output/idea_validation.json')}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(res.statusText);
      const data = await res.json();
      const allIdeas = Array.isArray(data.validated_ideas) ? data.validated_ideas : [];
      ideas = await alignIdeasWithScreening(run.run_id, allIdeas);
    } catch (e) {
      container.innerHTML = `
        <div style="color:#f87171">加载候选选题失败：${escHtml(e.message)}</div>
        <button class="btn btn-ghost" style="margin-top:8px" onclick="retryHitlPicker('${run.run_id}')">重试</button>
      `;
      return;
    }
  }

  if (!ideas.length && !speculativeIdeas.length) {
    container.innerHTML = '<div style="color:#f87171">未找到候选选题，请检查 output/idea_validation.json。</div>';
    return;
  }

  // Executability badge
  const execBadge = status => {
    if (status === 'ready') return '<span class="exec-ready">✓ Ready</span>';
    if (status === 'blocked') return '<span class="exec-blocked">✗ Blocked</span>';
    return '<span class="exec-review">⚠ Needs review</span>';
  };

  const cardsHtml = ideas.map((idea, i) => {
    const display = idea._display || {};
    const layer1Title = display.display_title || idea.title || '?';
    const researchQuestion = display.research_question || '';
    const rationaleText = display.rationale || idea.brief_rationale || '';
    const contributionAngle = display.contribution_angle || '';
    const executionSummary = display.execution_summary || '';
    const noveltyVerdict = (idea.novelty && idea.novelty.verdict) || 'pending_literature_check';
    const noveltyLabel = noveltyVerdict === 'pending_literature_check'
      ? '原创性：选中后再做文献核查 (pending literature check)'
      : `原创性：${escHtml(noveltyVerdict)}`;

    const execStatus = idea._executability_status || 'needs_review';
    const borderColor = execStatus === 'blocked' ? '#7f1d1d' : execStatus === 'ready' ? '#14532d' : '#78350f';

    // Design spec rows — folded into <details> as Layer 2.
    const expSrc = idea._exposure_source ? escHtml(idea._exposure_source) : '';
    const outSrc = idea._outcome_source ? escHtml(idea._outcome_source) : '';
    const expSpec = idea._exposure_specific ? escHtml(idea._exposure_specific) : '';
    const outSpec = idea._outcome_specific ? escHtml(idea._outcome_specific) : '';
    const method = idea._method ? escHtml(idea._method) : '';
    const claim = idea._claim_strength ? escHtml(idea._claim_strength) : '';
    const threats = Array.isArray(idea._key_threats) ? idea._key_threats.length : 0;
    const isTrainingIdea = idea._unit_of_analysis === 'training_run';
    const hitlExpLabel = isTrainingIdea ? 'Training Strategy' : 'Exposure';
    const hitlOutLabel = isTrainingIdea ? 'Evaluation Target' : 'Outcome';
    const designHtml = (expSrc || outSrc || method) ? `
      <div style="margin-top:6px;padding:8px;background:#0f172a;border-radius:6px;display:flex;flex-direction:column;gap:3px;font-size:.78rem">
        ${executionSummary ? `<div style="color:#cbd5e1">${escHtml(executionSummary)}</div>` : ''}
        ${expSrc ? `<div class="design-row"><strong>${hitlExpLabel}:</strong> ${expSpec || '—'} · <em>${expSrc}</em></div>` : ''}
        ${outSrc ? `<div class="design-row"><strong>${hitlOutLabel}:</strong> ${outSpec || '—'} · <em>${outSrc}</em></div>` : ''}
        ${method ? `<div class="design-row"><strong>Method:</strong> ${method}${claim ? ` · <strong>Claim:</strong> ${claim}` : ''}${threats ? ` · ${threats} threats addressed` : ''}</div>` : ''}
        ${contributionAngle ? `<div style="margin-top:4px;color:#94a3b8">Angle: ${escHtml(contributionAngle)}</div>` : ''}
      </div>` : '';

    // Reasons classified by severity
    const reasons = Array.isArray(idea._eval_reasons) ? idea._eval_reasons : (Array.isArray(idea.failure_reasons) ? idea.failure_reasons : []);
    const blockerReasons = reasons.filter(r => _BLOCKER_REASONS.has(r));
    const reviewReasons = reasons.filter(r => _REVIEW_REASONS.has(r));
    const infoReasons = reasons.filter(r => _INFO_REASONS.has(r));
    const reasonsHtml = [
      ...blockerReasons.map(r => `<div class="reason-blocker">✗ ${escHtml(r)}</div>`),
      ...reviewReasons.map(r => `<div class="reason-review">⚠ ${escHtml(r)}</div>`),
      ...infoReasons.map(r => `<div class="reason-info">ℹ ${escHtml(r)}</div>`),
    ].join('');

    return `
      <label class="hitl-card" style="display:block;padding:12px;margin-bottom:10px;border:1px solid ${borderColor};border-radius:8px;cursor:pointer">
        <div style="display:flex;align-items:flex-start;gap:10px">
          <input type="radio" name="hitlChoice" value="${idea._candidate_id || i}" ${i === 0 ? 'checked' : ''} style="margin-top:4px">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              ${execBadge(execStatus)}
              <span style="font-weight:600;color:#e2e8f0">选题 ${i + 1}: ${escHtml(layer1Title)}</span>
            </div>
            ${researchQuestion ? `<div style="margin-top:4px;font-size:.82rem;color:#94a3b8">${escHtml(researchQuestion)}</div>` : ''}
            ${rationaleText ? `<div style="margin-top:4px;font-size:.82rem;color:#cbd5e1">${escHtml(rationaleText)}</div>` : ''}
            <div style="margin-top:4px;font-size:.78rem;color:#64748b">${noveltyLabel}</div>
            <details style="margin-top:6px">
              <summary style="cursor:pointer;font-size:.78rem;color:#94a3b8">展开执行细节 (sources · method · grain)</summary>
              ${designHtml}
            </details>
            ${reasonsHtml ? `<div style="margin-top:6px">${reasonsHtml}</div>` : ''}
          </div>
        </div>
      </label>
    `;
  }).join('');

  const speculativeHtml = speculativeIdeas.length ? `
    <div style="margin-top:14px;margin-bottom:10px;padding:12px;border:1px dashed #475569;border-radius:8px;background:#020617">
      <div style="font-weight:600;color:#cbd5e1;margin-bottom:6px">Speculative ideas · 高新技术候选（仅供人工评估）</div>
      <div style="font-size:.8rem;color:#94a3b8;margin-bottom:8px">
        这些想法保留了街景/视觉等新技术方向，但因 API 密钥、图像政策或自动化风险暂不进入可执行 shortlist。
      </div>
      ${speculativeIdeas.map((idea, i) => {
        const display = idea._display || {};
        const title = display.display_title || idea.title || '?';
        const rq = display.research_question || '';
        const tags = (idea._technology_tags || []).map(t => `<span class="badge">${escHtml(t)}</span>`).join(' ');
        const unlocks = (idea._unlock_requirements || []).map(u => `<li>${escHtml(u)}</li>`).join('');
        return `
          <div style="padding:10px;margin-top:8px;border:1px solid #334155;border-radius:8px;background:#0f172a">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span class="exec-blocked">Blocked</span>
              <span style="font-weight:600;color:#e2e8f0">Spec ${i + 1}: ${escHtml(title)}</span>
              ${tags}
            </div>
            ${rq ? `<div style="margin-top:4px;font-size:.82rem;color:#94a3b8">${escHtml(rq)}</div>` : ''}
            ${idea._why_speculative ? `<div style="margin-top:4px;font-size:.8rem;color:#cbd5e1">${escHtml(idea._why_speculative)}</div>` : ''}
            ${unlocks ? `<ul style="margin:6px 0 0 18px;color:#94a3b8;font-size:.78rem">${unlocks}</ul>` : ''}
          </div>
        `;
      }).join('')}
    </div>
  ` : '';

  const canRegen = round < MAX_REGEN_ROUNDS;
  const regenHtml = `
    <label class="hitl-card" style="display:block;padding:12px;margin-bottom:10px;border:1px dashed #334155;border-radius:8px;cursor:${canRegen ? 'pointer' : 'not-allowed'};opacity:${canRegen ? '1' : '.55'}">
      <div style="display:flex;align-items:center;gap:10px">
        <input type="radio" name="hitlChoice" value="regenerate" ${canRegen ? '' : 'disabled'}>
        <div style="flex:1">
          <div style="font-weight:600;color:#e2e8f0">🔄 都不满意，重新构思主题筛选</div>
          <div style="margin-top:4px;font-size:.78rem;color:#94a3b8">
            ${canRegen ? `已重新构思 ${round}/${MAX_REGEN_ROUNDS} 次` : `已达到最大重新构思次数（${MAX_REGEN_ROUNDS}），请从当前选题中选择。`}
          </div>
        </div>
      </div>
    </label>
  `;

  container.innerHTML = `
    ${cardsHtml}
    ${speculativeHtml}
    ${regenHtml}
    <div class="hitl-actions" style="display:flex;gap:10px;margin-top:10px">
      <button class="btn btn-success" onclick="confirmHitl('${run.run_id}')">确认</button>
      <button class="btn btn-danger"  onclick="rejectRun('${run.run_id}')">终止任务</button>
    </div>
  `;
  container.dataset.ready = '1';
}

async function retryHitlPicker(runId) {
  try {
    const run = await api('GET', `/runs/${runId}/status`);
    const container = document.getElementById('hitlPicker');
    if (container) { container.dataset.ready = '0'; container.dataset.round = '-1'; }
    renderHitlPicker(run);
  } catch(e) { toast('重试失败：' + e.message, 'error'); }
}

async function confirmHitl(runId) {
  const picked = document.querySelector('input[name="hitlChoice"]:checked');
  if (!picked) { toast('请先选择一项', 'error'); return; }
  const val = picked.value;
  try {
    if (val === 'regenerate') {
      await api('POST', `/runs/${runId}/approve`, { action: 'regenerate' });
      toast('正在重新构思选题…', 'success');
      const container = document.getElementById('hitlPicker');
      if (container) container.dataset.ready = '0';
    } else {
      // Use candidate_id-based selection endpoint (new two-stage flow).
      // val is a candidate_id string; fall back to index-based approve for legacy runs.
      const isLegacyIndex = /^\d+$/.test(val) && !val.startsWith('candidate_');
      if (isLegacyIndex) {
        await api('POST', `/runs/${runId}/approve`, { action: 'select', selected_idea_index: Number(val) });
      } else {
        await api('POST', `/runs/${runId}/candidates/${encodeURIComponent(val)}/select`);
      }
      toast('已选定候选，Stage 2 原创性检查开始…', 'success');
    }
    await refreshDetail();
    schedulePoll();
  } catch(e) { toast('操作失败：' + e.message, 'error'); }
}

async function rejectRun(runId) {
  if (!confirm('确认终止此任务？')) return;
  try {
    await api('POST', `/runs/${runId}/reject`);
    toast('任务已终止', 'success');
    await refreshDetail();
  } catch(e) { toast('操作失败：' + e.message, 'error'); }
}

async function fetchLogs() {

// ── Outputs tab ──────────────────────────────────────────────────────────────
const CANDIDATE_OUTPUT_NAMES = new Set([
  'candidate_cards.json','feasibility_report.json','repair_history.json',
  'topic_screening.json','idea_validation.json','ideation_run_summary.json',
  'field_scan.json',
]);
const SELECTED_OUTPUT_NAMES = new Set([
  'research_plan.json','research_memo.md','literature_index.json',
  'data_access_report.json','academic_draft.md','Draft_v1.md',
  'references.bib','research_context.json',
]);
const DEV_OUTPUT_SUFFIXES = [
  'implementation_spec.json','claude_task_prompt.md','data_contract.yaml',
  'feature_plan.yaml','analysis_plan.yaml','acceptance_tests.md',
  'experiment_config.yaml','training_plan.yaml','evaluation_plan.yaml',
  'colab_notebook_spec.md',
];

function _semanticGroup(filename) {
  const base = filename.split('/').pop();
  if (filename.includes('development_packs') || DEV_OUTPUT_SUFFIXES.some(s => base === s))
    return 'Development Outputs';
  if (CANDIDATE_OUTPUT_NAMES.has(base)) return 'Candidate Outputs';
  if (SELECTED_OUTPUT_NAMES.has(base))  return 'Selected Research Outputs';
  if (filename.includes('ideation_traces') || base.includes('diagnostic') || base.includes('gate_trace'))
    return 'Diagnostics';
  return 'Other';
}

function renderOutputsTab(el, run) {
  el.innerHTML = '<div style="color:#64748b;font-size:.875rem">加载中...</div>';
  api('GET', `/runs/${run.run_id}/outputs`).then(data => {
    if (!data.files || !data.files.length) {
      el.innerHTML = '<div style="color:#64748b;font-size:.875rem">暂无输出文件</div>';
      return;
    }

    // Semantic grouping
    const groupOrder = ['Candidate Outputs','Selected Research Outputs','Development Outputs','Diagnostics','Other'];
    const groups = {};
    groupOrder.forEach(g => { groups[g] = []; });
    data.files.forEach(f => {
      const g = _semanticGroup(f.filename);
      groups[g].push(f);
    });

    const makeCard = (f) => {
      const viewable = isViewable(f.filename);
      const shortName = f.filename.includes('/') ? f.filename.split('/').slice(1).join('/') : f.filename;
      return `
      <div class="output-card">
        <div class="output-card-name" title="${escHtml(f.filename)}">${escHtml(shortName)}</div>
        <div class="output-card-size">${fmtBytes(f.size_bytes)}</div>
        <div style="display:flex;gap:12px;margin-top:4px">
          ${viewable ? `<a href="#" onclick="openFileViewer('${escAttr(run.run_id)}','${escAttr(f.filename)}');return false" style="font-size:.8rem;color:#a78bfa;text-decoration:none;cursor:pointer">◎ 查看</a>` : ''}
          <a href="/runs/${run.run_id}/outputs/${encodePath(f.filename)}" download="${escHtml(shortName)}" style="font-size:.8rem;color:#a78bfa;text-decoration:none">↓ 下载</a>
        </div>
      </div>`;
    };

    let html = '';
    for (const g of groupOrder) {
      if (!groups[g] || !groups[g].length) continue;
      html += `<div class="output-group-label">${g}</div>`;
      html += `<div class="output-grid">${groups[g].map(makeCard).join('')}</div>`;
    }
    el.innerHTML = html;
  }).catch(() => {
    el.innerHTML = '<div style="color:#f87171;font-size:.875rem">加载失败</div>';
  });
}

// ── Polling ──────────────────────────────────────────────────────────────────
function schedulePoll() {
  clearPoll();
  state.pollTimer = setInterval(async () => {
    await refreshDetail();
    if (state.activeTab === 'logs') fetchLogs();
    if (state.activeTab === 'status') fetchMilestones();
  }, 2000);
}
function clearPoll() {
  if (state.pollTimer) { clearInterval(state.pollTimer); state.pollTimer = null; }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function badgeClass(s) {
  return {starting:'badge-starting', running:'badge-running', awaiting_approval:'badge-awaiting',
          regenerating:'badge-running',
          completed:'badge-completed', failed:'badge-failed', aborted:'badge-aborted'}[s] || 'badge-starting';
}
function statusLabel(s) {
  return {starting:'启动中', running:'运行中', awaiting_approval:'待审批',
          regenerating:'重新构思中',
          completed:'已完成', failed:'失败', aborted:'已终止'}[s] || s;
}
function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
}
function fmtBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function encodePath(p) {
  return p.split('/').map(encodeURIComponent).join('/');
}
function escAttr(s) {
  // Escape for use inside single-quoted HTML attribute (JS string literal context)
  return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/</g,'\\x3c');
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── File viewer modal ───────────────────────────────────────────────
const VIEWABLE_EXT = ['.json','.md','.csv','.bib','.txt','.jsonl'];

function isViewable(filename) {
  const ext = '.' + filename.split('.').pop().toLowerCase();
  return VIEWABLE_EXT.includes(ext);
}

function getExt(filename) {
  return ('.' + filename.split('.').pop()).toLowerCase();
}

async function openFileViewer(runId, filename) {
  const modal = document.getElementById('fileModal');
  const title = document.getElementById('modalTitle');
  const body = document.getElementById('modalBody');
  const dl = document.getElementById('modalDownload');

  title.textContent = filename;
  body.innerHTML = '<div style="color:#64748b">加载中...</div>';
  dl.href = `/runs/${runId}/outputs/${encodePath(filename)}`;
  dl.download = filename.split('/').pop();
  modal.style.display = 'flex';

  try {
    const res = await fetch(`/runs/${runId}/outputs/${encodePath(filename)}`);
    if (!res.ok) throw new Error(res.statusText);
    let text = await res.text();
    const ext = getExt(filename);
    let truncated = false;
    if (text.length > 500000) {
      text = text.substring(0, 500000);
      truncated = true;
    }

    let html = '';
    if (ext === '.json') html = renderJsonContent(text);
    else if (ext === '.csv') html = renderCsvContent(text);
    else if (ext === '.md') html = renderMarkdownContent(text);
    else html = renderPlainContent(text);

    if (truncated) {
      html += '<div class="truncation-notice">文件过大，仅显示前 500KB 内容。请下载查看完整文件。</div>';
    }
    body.innerHTML = html;
  } catch(e) {
    body.innerHTML = `<div style="color:#f87171">加载失败: ${escHtml(e.message)}</div>`;
  }
}

function closeFileModal() {
  document.getElementById('fileModal').style.display = 'none';
  document.getElementById('modalBody').innerHTML = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeFileModal();
});

function renderJsonContent(text) {
  try {
    const obj = JSON.parse(text);
    const pretty = JSON.stringify(obj, null, 2);
    const highlighted = escHtml(pretty)
      .replace(/"([^"]+)"(\s*:)/g, '<span class="json-key">"$1"</span>$2')
      .replace(/:\s*"([^"]*?)"/g, ': <span class="json-str">"$1"</span>')
      .replace(/:\s*(-?\d+\.?\d*)/g, ': <span class="json-num">$1</span>')
      .replace(/:\s*(true|false)/g, ': <span class="json-bool">$1</span>')
      .replace(/:\s*(null)/g, ': <span class="json-null">$1</span>');
    return `<pre>${highlighted}</pre>`;
  } catch {
    return renderPlainContent(text);
  }
}

function renderCsvContent(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  if (!lines.length) return '<div style="color:#64748b">空文件</div>';

  function parseCsvLine(line) {
    const cells = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cells.push(cur.trim());
    return cells;
  }

  const header = parseCsvLine(lines[0]);
  let html = '<table><thead><tr>' + header.map(h => `<th>${escHtml(h)}</th>`).join('') + '</tr></thead><tbody>';
  for (let i = 1; i < lines.length; i++) {
    const cols = parseCsvLine(lines[i]);
    html += '<tr>' + cols.map(c => `<td>${escHtml(c)}</td>`).join('') + '</tr>';
  }
  html += '</tbody></table>';
  return html;
}

function renderMarkdownContent(text) {
  let html = escHtml(text);

  // Code blocks (``` ... ```)
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${code}</code></pre>`);

  // Headings
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Bold and italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Blockquotes
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // Unordered lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
  html = html.replace(/<\/ul>\s*<ul>/g, '');

  // Paragraphs - wrap remaining bare lines
  html = html.replace(/\n\n/g, '</p><p>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<p>\s*(<h[123]>)/g, '$1');
  html = html.replace(/(<\/h[123]>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*(<pre>)/g, '$1');
  html = html.replace(/(<\/pre>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*(<ul>)/g, '$1');
  html = html.replace(/(<\/ul>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*(<blockquote>)/g, '$1');
  html = html.replace(/(<\/blockquote>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*<\/p>/g, '');

  return `<div class="md-content">${html}</div>`;
}

function renderPlainContent(text) {
  return `<pre>${escHtml(text)}</pre>`;
}
